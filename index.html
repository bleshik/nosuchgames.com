<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D Skyblock</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    h1 { font-size: 1.2rem; font-weight: 600; }
    canvas {
      border: 3px solid #333;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .hud {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.85rem;
      opacity: 0.9;
    }
    .hotbar {
      display: flex;
      gap: 4px;
    }
    .slot {
      position: relative;
      width: 40px;
      height: 40px;
      border: 2px solid #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      background: #222;
    }
    .slot .count {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-size: 10px;
    }
    .slot.active { border-color: #fff; box-shadow: 0 0 8px rgba(255,255,255,0.3); }
    .slot .swatch { width: 24px; height: 24px; border: 1px solid rgba(0,0,0,0.3); }
    .help { max-width: 640px; text-align: center; font-size: 0.8rem; line-height: 1.5; opacity: 0.7; }
    .craft-panel {
      display: none;
      gap: 16px;
      padding: 14px;
      background: #16162a;
      border: 2px solid #444;
      border-radius: 8px;
      max-width: 640px;
      width: 100%;
    }
    .craft-panel.open { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-start; }
    .craft-section { display: flex; flex-direction: column; gap: 8px; }
    .craft-section h2 { font-size: 0.75rem; font-weight: 600; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.05em; }
    .craft-grid, .inv-grid { display: grid; grid-template-columns: repeat(2, 40px); gap: 4px; }
    .inv-grid { grid-template-columns: repeat(4, 40px); }
    .craft-arrow { font-size: 1.4rem; opacity: 0.5; align-self: center; padding: 0 8px; }
    .slot.craft-out { border-color: #8bc34a; }
    .slot.pick { outline: 2px solid #ffeb3b; outline-offset: 1px; }
    .recipes { font-size: 0.75rem; opacity: 0.75; line-height: 1.6; max-width: 200px; }
    .recipes li.ok { color: #8bc34a; }
  </style>
</head>
<body>
  <h1>2D Skyblock — прототип</h1>
  <canvas id="game" width="640" height="480"></canvas>
  <div class="hud">
    <span id="coords">x: 0, y: 0</span>
    <span id="blocks">Блоков: 0</span>
    <div class="hotbar" id="hotbar"></div>
  </div>
  <p class="help">
    WASD — ходить · Пробел — прыжок · ЛКМ — копать · ПКМ — поставить · 1–6 — блок · C — крафт
  </p>
  <div class="craft-panel" id="craftPanel">
    <div class="craft-section">
      <h2>Инвентарь</h2>
      <div class="inv-grid" id="invGrid"></div>
    </div>
    <div class="craft-arrow">→</div>
    <div class="craft-section">
      <h2>Комбинировать</h2>
      <div class="craft-grid" id="craftGrid"></div>
    </div>
    <div class="craft-arrow">→</div>
    <div class="craft-section">
      <h2>Результат</h2>
      <div class="slot craft-out" id="craftOut"></div>
    </div>
    <ul class="recipes" id="recipeList"></ul>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    const TILE = 32;
    const GRAVITY = 0.45;
    const JUMP = -9.5;
    const MOVE = 4;
    const WORLD_W = 50;
    const WORLD_H = 28;

    const BLOCKS = {
      air:         { id: 0, name: 'air',         solid: false },
      grass:       { id: 1, name: 'grass',       solid: true, side: '#8b6914', top: '#5cb85c', mid: '#4a9e4a', dark: '#3d7a36', hardness: 6 },
      dirt:        { id: 2, name: 'dirt',        solid: true, base: '#8b6914', mid: '#7a5c12', dark: '#5c450e', light: '#9a7518', hardness: 10 },
      stone:       { id: 3, name: 'stone',       solid: true, base: '#8a8a8a', mid: '#757575', dark: '#5e5e5e', light: '#a3a3a3', hardness: 28 },
      wood:        { id: 4, name: 'wood',        solid: true, base: '#6b4423', ring: '#5a381c', light: '#8b5a2b', dark: '#4a2f18', hardness: 14 },
      water:       { id: 5, name: 'water',       solid: false, fluid: true, decay: 1, tickRate: 5, deep: '#1d4ed8', base: '#2563eb', light: '#60a5fa', hardness: 4 },
      lava:        { id: 6, name: 'lava',        solid: false, fluid: true, decay: 2, tickRate: 30, deep: '#c2410c', base: '#ea580c', light: '#fb923c', hardness: 5 },
      cobblestone: { id: 7, name: 'cobblestone', solid: true, base: '#707070', mid: '#5a5a5a', dark: '#484848', light: '#909090', hardness: 22 },
      obsidian:    { id: 8, name: 'obsidian',    solid: true, base: '#1a1033', mid: '#2d1b4e', dark: '#0d081a', light: '#4a3070', hardness: 55 },
      leaves:      { id: 9, name: 'leaves',      solid: true, base: '#3d8c40', mid: '#2f7a33', dark: '#1f5a22', light: '#5cb85c', hole: '#2a6b2e', hardness: 4 },
    };

    const BLOCK_BY_ID = Object.fromEntries(Object.values(BLOCKS).map(b => [b.id, b]));
    const RECIPES = [
      { in: { water: 1, lava: 1 }, out: { cobblestone: 1 }, label: 'Вода + лава → булыжник' },
      { in: { cobblestone: 4 }, out: { stone: 1 }, label: '4 булыжника → камень' },
      { in: { dirt: 2, grass: 1 }, out: { grass: 3 }, label: '2 земли + трава → 3 травы' },
      { in: { leaves: 4 }, out: { wood: 1 }, label: '4 листа → дерево' },
      { in: { wood: 1 }, out: { leaves: 4 }, label: 'Дерево → 4 листа' },
      { in: { stone: 1, lava: 1, water: 1 }, out: { obsidian: 1 }, label: 'Камень + вода + лава → обсидиан' },
    ];
    const HOTBAR = ['grass', 'dirt', 'stone', 'wood', 'water', 'lava'];
    const MAX_FLUID_LEVEL = 8;
    const DROP_SEARCH = 4;

    let world = [];
    let fluidLevel = [];
    let fluidFalling = [];
    let inventory = { grass: 8, dirt: 16, stone: 4, wood: 2, water: 3, lava: 2, leaves: 0, cobblestone: 0, obsidian: 0 };
    let selected = 'grass';
    let craftOpen = false;
    let craftSlots = [null, null, null, null];
    let craftPick = null;
    let blockCount = 0;
    let fluidTick = 0;
    let animFrame = 0;

    const camera = { x: 0, y: 0 };

    const player = {
      x: 0,
      y: 0,
      w: 20,
      h: 28,
      vx: 0,
      vy: 0,
      onGround: false,
      facing: 1,
    };

    const keys = {};
    let mouse = { x: 0, y: 0, down: false, button: -1 };
    let mining = null;

    const SFX = (() => {
      let audio = null;
      let on = true;

      function ctx() {
        if (audio) return audio;
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audio = new AC();
        return audio;
      }

      function wake() {
        const c = ctx();
        if (c && c.state === 'suspended') c.resume();
        return c;
      }

      function tone(freq, dur, type = 'square', vol = 0.07, slide = 0) {
        const c = wake();
        if (!c || !on) return;
        const t = c.currentTime;
        const osc = c.createOscillator();
        const g = c.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        if (slide) osc.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), t + dur);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.connect(g);
        g.connect(c.destination);
        osc.start(t);
        osc.stop(t + dur + 0.02);
      }

      function burst(freqs, dur, type, vol) {
        freqs.forEach((f, i) => setTimeout(() => tone(f, dur, type, vol * (1 - i * 0.15)), i * 18));
      }

      function noise(dur, vol = 0.05, cutoff = 900) {
        const c = wake();
        if (!c || !on) return;
        const len = Math.floor(c.sampleRate * dur);
        const buf = c.createBuffer(1, len, c.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < len; i++) data[i] = Math.random() * 2 - 1;
        const src = c.createBufferSource();
        src.buffer = buf;
        const filter = c.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = cutoff;
        const g = c.createGain();
        const t = c.currentTime;
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        src.connect(filter);
        filter.connect(g);
        g.connect(c.destination);
        src.start(t);
        src.stop(t + dur + 0.02);
      }

      return {
        wake,
        mineHit(name) {
          if (name === 'stone' || name === 'cobblestone' || name === 'obsidian') {
            noise(0.03, 0.035, 1200);
            tone(180, 0.04, 'square', 0.03);
          } else if (name === 'wood') {
            tone(140, 0.05, 'triangle', 0.045);
          } else if (name === 'water' || name === 'lava') {
            noise(0.04, 0.03, 600);
          } else {
            tone(220 + Math.random() * 40, 0.035, 'triangle', 0.035);
          }
        },
        breakBlock(name) {
          if (name === 'stone' || name === 'cobblestone' || name === 'obsidian') {
            burst([220, 160, 110], 0.07, 'square', 0.06);
            noise(0.08, 0.07, 800);
          } else if (name === 'wood') {
            burst([120, 90], 0.08, 'triangle', 0.07);
          } else if (name === 'leaves' || name === 'grass') {
            burst([420, 520, 380], 0.05, 'triangle', 0.04);
          } else if (name === 'water') {
            noise(0.1, 0.06, 1400);
            tone(260, 0.08, 'sine', 0.03, -80);
          } else if (name === 'lava') {
            noise(0.12, 0.07, 500);
            tone(90, 0.12, 'sawtooth', 0.05);
          } else {
            burst([180, 140], 0.06, 'triangle', 0.05);
            noise(0.05, 0.04, 700);
          }
        },
        place(name) {
          if (name === 'water') {
            noise(0.07, 0.045, 1500);
            tone(300, 0.06, 'sine', 0.03, -60);
          } else if (name === 'lava') {
            tone(110, 0.08, 'sawtooth', 0.04);
            noise(0.06, 0.04, 450);
          } else if (name === 'stone' || name === 'cobblestone' || name === 'obsidian') {
            tone(160, 0.05, 'square', 0.045, -30);
          } else {
            tone(200, 0.04, 'triangle', 0.04, -20);
          }
        },
        mixStone() {
          burst([140, 100], 0.09, 'square', 0.06);
          noise(0.1, 0.06, 600);
        },
        jump() {
          tone(240, 0.07, 'square', 0.04, 120);
        },
        hurt() {
          tone(90, 0.18, 'sawtooth', 0.08, -30);
          noise(0.12, 0.06, 350);
        },
        land() {
          tone(120, 0.04, 'triangle', 0.03, -20);
        },
      };
    })();

    function createIsland() {
      world = Array.from({ length: WORLD_H }, () => Array(WORLD_W).fill(0));
      fluidLevel = Array.from({ length: WORLD_H }, () => Array(WORLD_W).fill(-1));
      fluidFalling = Array.from({ length: WORLD_H }, () => Array(WORLD_W).fill(false));

      const cx = Math.floor(WORLD_W / 2);
      const cy = 8;

      for (let dx = -3; dx <= 3; dx++) {
        for (let dy = 0; dy <= 2; dy++) {
          const x = cx + dx;
          const y = cy + dy;
          if (x >= 0 && x < WORLD_W && y >= 0 && y < WORLD_H) {
            setBlock(x, y, dy === 0 ? BLOCKS.grass.id : BLOCKS.dirt.id);
          }
        }
      }

      setBlock(cx - 1, cy - 1, BLOCKS.wood.id);
      setBlock(cx, cy - 1, BLOCKS.wood.id);
      setBlock(cx + 1, cy - 1, BLOCKS.wood.id);
      setBlock(cx, cy - 2, BLOCKS.wood.id);
      setBlock(cx, cy - 3, BLOCKS.wood.id);
      setBlock(cx - 1, cy - 4, BLOCKS.leaves.id);
      setBlock(cx, cy - 4, BLOCKS.leaves.id);
      setBlock(cx + 1, cy - 4, BLOCKS.leaves.id);

      createFluidPit(cx - 2, cy, BLOCKS.water.id);
      createFluidPit(cx + 2, cy, BLOCKS.lava.id);
      resetPlayer();
    }

    function resetPlayer() {
      const cx = Math.floor(WORLD_W / 2);
      player.x = cx * TILE - player.w / 2;
      player.y = 4 * TILE;
      player.vy = 0;
      player.vx = 0;
    }

    function createFluidPit(x, surfaceY, fluidId) {
      setBlock(x, surfaceY, fluidId, 0);
    }

    function countBlocks() {
      let n = 0;
      for (let y = 0; y < WORLD_H; y++)
        for (let x = 0; x < WORLD_W; x++)
          if (world[y][x] !== 0) n++;
      return n;
    }

    function getBlock(x, y) {
      if (x < 0 || y < 0 || x >= WORLD_W || y >= WORLD_H) return BLOCKS.air;
      return BLOCK_BY_ID[world[y][x]] || BLOCKS.air;
    }

    function setBlock(x, y, id, level = -1, falling = false) {
      if (x < 0 || y < 0 || x >= WORLD_W || y >= WORLD_H) return false;
      world[y][x] = id;
      const block = BLOCK_BY_ID[id];
      if (block?.fluid) {
        fluidLevel[y][x] = level >= 0 ? level : 0;
        fluidFalling[y][x] = falling;
      } else {
        fluidLevel[y][x] = -1;
        fluidFalling[y][x] = false;
      }
      blockCount = countBlocks();
      return true;
    }

    function inBounds(x, y) {
      return x >= 0 && y >= 0 && x < WORLD_W && y < WORLD_H;
    }

    function isFluidId(id) {
      return id === BLOCKS.water.id || id === BLOCKS.lava.id;
    }

    function cellIsAir(grid, x, y) {
      return inBounds(x, y) && grid[y][x] === 0;
    }

    function hasFloorIn(grid, x, y) {
      if (!inBounds(x, y)) return false;
      if (y >= WORLD_H - 1) return true;
      return grid[y + 1][x] !== 0;
    }

    function hasAirBelowIn(grid, x, y) {
      return inBounds(x, y) && y + 1 < WORLD_H && grid[y + 1][x] === 0;
    }

    function dropDistanceIn(grid, x, y) {
      if (hasAirBelowIn(grid, x, y)) return 0;
      let best = DROP_SEARCH + 1;
      for (let tx = 0; tx < WORLD_W; tx++) {
        const dist = Math.abs(tx - x);
        if (dist > DROP_SEARCH) continue;
        if (hasAirBelowIn(grid, tx, y)) best = Math.min(best, dist);
      }
      return best;
    }

    function canSpreadSidewaysIn(grid, fromX, y, toX) {
      if (!cellIsAir(grid, toX, y)) return false;
      if (hasFloorIn(grid, toX, y)) return true;
      return dropDistanceIn(grid, toX, y) < dropDistanceIn(grid, fromX, y);
    }

    function mixFluids(x, y, fluidId, otherId, otherLevel) {
      const waterId = BLOCKS.water.id;
      const lavaId = BLOCKS.lava.id;
      if (fluidId === waterId && otherId === lavaId) {
        return otherLevel === 0 ? BLOCKS.obsidian.id : BLOCKS.cobblestone.id;
      }
      if (fluidId === lavaId && otherId === waterId) {
        return BLOCKS.cobblestone.id;
      }
      return null;
    }

    function applyFluidSpread(x, y, fluidId, level, falling) {
      if (!inBounds(x, y)) return;

      const current = world[y][x];
      if (current === 0) {
        setBlock(x, y, fluidId, level, falling);
        return;
      }

      if (current === fluidId) {
        const curLevel = fluidLevel[y][x];
        if (curLevel < 0 || level < curLevel || (level === curLevel && falling && !fluidFalling[y][x])) {
          fluidLevel[y][x] = level;
          fluidFalling[y][x] = falling;
        }
        return;
      }

      if (isFluidId(current)) {
        const stoneId = mixFluids(x, y, fluidId, current, fluidLevel[y][x]);
        if (stoneId) setBlock(x, y, stoneId);
      }
    }

    function reconcileFluid(fluidId, decay) {
      for (let y = 0; y < WORLD_H; y++) {
        for (let x = 0; x < WORLD_W; x++) {
          if (world[y][x] !== fluidId) continue;
          if (fluidLevel[y][x] === 0) continue;

          if (y > 0 && world[y - 1][x] === fluidId) {
            fluidLevel[y][x] = 1;
            fluidFalling[y][x] = hasAirBelowIn(world, x, y);
            continue;
          }

          let minNeighbor = Infinity;
          for (const nx of [x - 1, x + 1]) {
            if (!inBounds(nx, y)) continue;
            if (world[y][nx] !== fluidId) continue;
            if (fluidFalling[y][nx]) continue;
            minNeighbor = Math.min(minNeighbor, fluidLevel[y][nx]);
          }

          if (minNeighbor === Infinity) {
            setBlock(x, y, 0);
            continue;
          }

          const expected = minNeighbor + decay;
          if (expected >= MAX_FLUID_LEVEL) {
            setBlock(x, y, 0);
            continue;
          }

          fluidLevel[y][x] = expected;
          fluidFalling[y][x] = false;
        }
      }
    }

    function formWaterSources() {
      for (let y = 0; y < WORLD_H; y++) {
        for (let x = 0; x < WORLD_W; x++) {
          if (world[y][x] !== BLOCKS.water.id || fluidLevel[y][x] === 0) continue;
          let sources = 0;
          if (x > 0 && world[y][x - 1] === BLOCKS.water.id && fluidLevel[y][x - 1] === 0) sources++;
          if (x < WORLD_W - 1 && world[y][x + 1] === BLOCKS.water.id && fluidLevel[y][x + 1] === 0) sources++;
          if (sources >= 2) {
            fluidLevel[y][x] = 0;
            fluidFalling[y][x] = false;
          }
        }
      }
    }

    function simulateFluid(fluidId) {
      const block = BLOCK_BY_ID[fluidId];
      if (fluidTick % block.tickRate !== 0) return;

      const decay = block.decay;
      const pending = new Map();

      const queue = (x, y, level, falling) => {
        const key = `${x},${y}`;
        const prev = pending.get(key);
        if (!prev || level < prev.level || (level === prev.level && falling && !prev.falling)) {
          pending.set(key, { x, y, level, falling });
        }
      };

      for (let y = WORLD_H - 1; y >= 0; y--) {
        for (let x = 0; x < WORLD_W; x++) {
          if (world[y][x] !== fluidId) continue;

          const level = fluidLevel[y][x];
          const falling = fluidFalling[y][x];

          if (y + 1 < WORLD_H && world[y + 1][x] === 0) {
            queue(x, y + 1, 1, true);
          }

          if (falling) continue;

          const spreadLevel = level === 0 ? 1 : level + decay;
          if (spreadLevel >= MAX_FLUID_LEVEL) continue;

          for (const dx of [-1, 1]) {
            const nx = x + dx;
            if (world[y][nx] !== 0) continue;
            if (!canSpreadSidewaysIn(world, x, y, nx)) continue;
            queue(nx, y, spreadLevel, false);
          }
        }
      }

      for (const spread of pending.values()) {
        applyFluidSpread(spread.x, spread.y, fluidId, spread.level, spread.falling);
      }

      reconcileFluid(fluidId, decay);

      if (fluidId === BLOCKS.water.id) {
        formWaterSources();
      }

      blockCount = countBlocks();
    }

    function tickFluids() {
      fluidTick++;
      simulateFluid(BLOCKS.water.id);
      simulateFluid(BLOCKS.lava.id);
    }

    function getFluidAtPlayer() {
      const cx = Math.floor((player.x + player.w / 2) / TILE);
      const cy = Math.floor((player.y + player.h / 2) / TILE);
      return getBlock(cx, cy);
    }

    function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function collides(px, py, pw, ph) {
      const left = Math.floor(px / TILE);
      const right = Math.floor((px + pw - 1) / TILE);
      const top = Math.floor(py / TILE);
      const bottom = Math.floor((py + ph - 1) / TILE);

      for (let ty = top; ty <= bottom; ty++) {
        for (let tx = left; tx <= right; tx++) {
          if (getBlock(tx, ty).solid) {
            const bx = tx * TILE;
            const by = ty * TILE;
            if (rectOverlap(px, py, pw, ph, bx, by, TILE, TILE)) return { tx, ty, bx, by };
          }
        }
      }
      return null;
    }

    function movePlayer() {
      const fluid = getFluidAtPlayer();
      const inWater = fluid.name === 'water';
      const inLava = fluid.name === 'lava';
      const moveSpeed = inWater ? MOVE * 0.55 : MOVE;
      const gravity = inWater ? GRAVITY * 0.35 : GRAVITY;
      const jumpPower = inWater ? JUMP * 0.7 : JUMP;
      const maxFall = inWater ? 6 : 12;

      player.vx = 0;
      if (keys['ArrowLeft'] || keys['a'] || keys['A']) { player.vx = -moveSpeed; player.facing = -1; }
      if (keys['ArrowRight'] || keys['d'] || keys['D']) { player.vx = moveSpeed; player.facing = 1; }

      if ((keys[' '] || keys['ArrowUp'] || keys['w'] || keys['W']) && (player.onGround || inWater)) {
        player.vy = jumpPower;
        player.onGround = false;
        SFX.jump();
      }

      player.vy += gravity;
      if (player.vy > maxFall) player.vy = maxFall;

      if (inLava && fluidTick % 20 === 0) {
        SFX.hurt();
        resetPlayer();
      }

      let nx = player.x + player.vx;
      let hit = collides(nx, player.y, player.w, player.h);
      if (hit) {
        if (player.vx > 0) nx = hit.bx - player.w;
        else if (player.vx < 0) nx = hit.bx + TILE;
      }
      player.x = nx;

      let ny = player.y + player.vy;
      hit = collides(player.x, ny, player.w, player.h);
      player.onGround = false;
      if (hit) {
        if (player.vy > 0) {
          ny = hit.by - player.h;
          if (player.vy > 4) SFX.land();
          player.onGround = true;
          player.vy = 0;
        } else if (player.vy < 0) {
          ny = hit.by + TILE;
          player.vy = 0;
        }
      }
      player.y = ny;

      if (player.y > WORLD_H * TILE + 100) {
        SFX.hurt();
        resetPlayer();
      }
    }

    function updateCamera() {
      const targetX = player.x + player.w / 2 - canvas.width / 2;
      const targetY = player.y + player.h / 2 - canvas.height / 2;
      const maxX = Math.max(0, WORLD_W * TILE - canvas.width);
      const maxY = Math.max(0, WORLD_H * TILE - canvas.height);
      const cx = Math.max(0, Math.min(targetX, maxX));
      const cy = Math.max(0, Math.min(targetY, maxY));
      camera.x += (cx - camera.x) * 0.12;
      camera.y += (cy - camera.y) * 0.12;
    }

    function screenToTile(sx, sy) {
      const wx = sx + camera.x;
      const wy = sy + camera.y;
      return { tx: Math.floor(wx / TILE), ty: Math.floor(wy / TILE) };
    }

    function playerNear(tx, ty) {
      const px = player.x + player.w / 2;
      const py = player.y + player.h / 2;
      const bx = tx * TILE + TILE / 2;
      const by = ty * TILE + TILE / 2;
      const dist = Math.hypot(px - bx, py - by);
      return dist < TILE * 4;
    }

    function getBlockHardness(block) {
      return block.hardness ?? 15;
    }

    function finishBreak(tx, ty) {
      const block = getBlock(tx, ty);
      if (block.id === 0) return;

      SFX.breakBlock(block.name);
      const isFluidSource = block.fluid && fluidLevel[ty][tx] === 0;
      setBlock(tx, ty, 0);

      if (block.fluid && !isFluidSource) {
        updateHotbar();
        updateCraftUI();
        return;
      }

      if (block.name !== 'air') {
        inventory[block.name] = (inventory[block.name] || 0) + 1;
      }
      updateHotbar();
      updateCraftUI();
    }

    function resetMining() {
      mining = null;
    }

    function tickMining() {
      if (!mouse.down || mouse.button !== 0) {
        resetMining();
        return;
      }

      const { tx, ty } = screenToTile(mouse.x, mouse.y);
      const block = getBlock(tx, ty);
      if (block.id === 0 || !playerNear(tx, ty)) {
        resetMining();
        return;
      }

      const need = getBlockHardness(block);
      if (!mining || mining.tx !== tx || mining.ty !== ty) {
        mining = { tx, ty, progress: 0, need, lastStage: -1 };
      }

      mining.progress += 1;
      const stage = Math.floor((mining.progress / mining.need) * 5);
      if (stage > mining.lastStage) {
        mining.lastStage = stage;
        SFX.mineHit(block.name);
      }
      if (mining.progress >= mining.need) {
        finishBreak(tx, ty);
        resetMining();
      }
    }

    function drawMiningCracks() {
      if (!mining) return;

      const { tx, ty, progress, need } = mining;
      const x = tx * TILE;
      const y = ty * TILE;
      const t = progress / need;

      ctx.save();
      ctx.strokeStyle = `rgba(0,0,0,${0.35 + t * 0.45})`;
      ctx.lineWidth = 2;

      const cracks = [
        [[x + 4, y + 6], [x + 14, y + 18], [x + 26, y + 10]],
        [[x + 28, y + 4], [x + 18, y + 16], [x + 8, y + 28]],
        [[x + 6, y + 22], [x + 16, y + 12], [x + 24, y + 26]],
        [[x + 2, y + 14], [x + 30, y + 14]],
        [[x + 10, y + 2], [x + 10, y + 30], [x + 22, y + 22]],
        [[x + 20, y + 4], [x + 6, y + 18], [x + 28, y + 28]],
      ];

      const count = Math.max(1, Math.ceil(t * cracks.length));
      for (let i = 0; i < count; i++) {
        const pts = cracks[i];
        ctx.beginPath();
        ctx.moveTo(pts[0][0], pts[0][1]);
        for (let j = 1; j < pts.length; j++) {
          ctx.lineTo(pts[j][0], pts[j][1]);
        }
        ctx.stroke();
      }

      ctx.fillStyle = `rgba(255,255,255,${0.08 + t * 0.12})`;
      ctx.fillRect(x + 1, y + 1, TILE - 2, Math.max(2, (TILE - 2) * (1 - t)));

      ctx.restore();
    }

    function placeBlock(tx, ty) {
      const block = getBlock(tx, ty);
      if (!playerNear(tx, ty)) return;
      if (!BLOCKS[selected]) return;
      if (!inventory[selected] || inventory[selected] <= 0) return;

      const type = BLOCKS[selected];
      const canReplaceFluid = !type.fluid && block.fluid;
      if (block.id !== 0 && !canReplaceFluid) return;

      const bx = tx * TILE;
      const by = ty * TILE;
      if (rectOverlap(player.x, player.y, player.w, player.h, bx, by, TILE, TILE)) return;
      if (type.fluid) {
        let mixed = null;
        for (const [nx, ny] of [[tx - 1, ty], [tx + 1, ty], [tx, ty - 1], [tx, ty + 1]]) {
          if (!inBounds(nx, ny)) continue;
          const neighborId = world[ny][nx];
          if (!isFluidId(neighborId)) continue;
          mixed = mixFluids(tx, ty, type.id, neighborId, fluidLevel[ny][nx]);
          if (mixed) break;
        }
        if (mixed) {
          setBlock(tx, ty, mixed);
          SFX.mixStone();
        } else {
          setBlock(tx, ty, type.id, 0);
          SFX.place(type.name);
        }
      } else {
        setBlock(tx, ty, type.id);
        SFX.place(type.name);
      }
      inventory[selected]--;
      updateHotbar();
      updateCraftUI();
    }

    function getCraftCounts() {
      const counts = {};
      for (const slot of craftSlots) {
        if (!slot) continue;
        counts[slot] = (counts[slot] || 0) + 1;
      }
      return counts;
    }

    function recipeMatches(counts, recipe) {
      let total = 0;
      for (const [name, need] of Object.entries(recipe.in)) {
        if ((counts[name] || 0) !== need) return false;
        total += need;
      }
      const gridTotal = Object.values(counts).reduce((a, b) => a + b, 0);
      return gridTotal === total;
    }

    function findRecipe() {
      const counts = getCraftCounts();
      return RECIPES.find(r => recipeMatches(counts, r)) || null;
    }

    function slotHtml(name, count, extraClass = '') {
      const b = BLOCKS[name];
      if (!b) return '';
      const pick = craftPick === name ? ' pick' : '';
      const active = selected === name ? ' active' : '';
      return `<div class="slot${extraClass}${pick}${active}" data-item="${name}" title="${name}: ${count}">
        <div class="swatch" style="background:${blockPreviewColor(b)}"></div>
        <span class="count">${count}</span>
      </div>`;
    }

    function takeFromInventory(name) {
      if (!inventory[name] || inventory[name] <= 0) return false;
      inventory[name]--;
      return true;
    }

    function giveToInventory(name, count = 1) {
      inventory[name] = (inventory[name] || 0) + count;
    }

    function returnCraftSlot(i) {
      const name = craftSlots[i];
      if (!name) return;
      giveToInventory(name);
      craftSlots[i] = null;
    }

    function placeCraftSlot(i, name) {
      if (!takeFromInventory(name)) return false;
      if (craftSlots[i]) giveToInventory(craftSlots[i]);
      craftSlots[i] = name;
      return true;
    }

    function craftOutput() {
      const recipe = findRecipe();
      if (!recipe) return;

      for (let i = 0; i < craftSlots.length; i++) craftSlots[i] = null;
      for (const [name, count] of Object.entries(recipe.out)) {
        giveToInventory(name, count);
      }
      SFX.place(Object.keys(recipe.out)[0]);
      updateHotbar();
      updateCraftUI();
    }

    function updateCraftUI() {
      if (!craftOpen) return;

      const invGrid = document.getElementById('invGrid');
      const items = Object.entries(inventory).filter(([, n]) => n > 0);
      invGrid.innerHTML = items.length
        ? items.map(([name, count]) => slotHtml(name, count)).join('')
        : '<span style="font-size:0.75rem;opacity:0.5">пусто</span>';

      invGrid.querySelectorAll('.slot').forEach(el => {
        el.onclick = () => {
          craftPick = el.dataset.item;
          selected = craftPick;
          updateHotbar();
          updateCraftUI();
        };
      });

      const craftGrid = document.getElementById('craftGrid');
      craftGrid.innerHTML = craftSlots.map((name, i) => {
        if (!name) return `<div class="slot" data-idx="${i}"></div>`;
        return `<div class="slot" data-idx="${i}" title="${name}">
          <div class="swatch" style="background:${blockPreviewColor(BLOCKS[name])}"></div>
        </div>`;
      }).join('');

      craftGrid.querySelectorAll('.slot').forEach(el => {
        el.onclick = () => {
          const idx = +el.dataset.idx;
          if (craftPick) {
            placeCraftSlot(idx, craftPick);
            craftPick = null;
          } else if (craftSlots[idx]) {
            returnCraftSlot(idx);
          }
          updateCraftUI();
        };
        el.oncontextmenu = e => {
          e.preventDefault();
          returnCraftSlot(+el.dataset.idx);
          updateCraftUI();
        };
      });

      const recipe = findRecipe();
      const out = document.getElementById('craftOut');
      if (recipe) {
        const outName = Object.keys(recipe.out)[0];
        const outCount = recipe.out[outName];
        out.innerHTML = `<div class="swatch" style="background:${blockPreviewColor(BLOCKS[outName])}"></div>
          <span class="count">${outCount}</span>`;
        out.style.cursor = 'pointer';
        out.onclick = craftOutput;
      } else {
        out.innerHTML = '';
        out.style.cursor = 'default';
        out.onclick = null;
      }

      const list = document.getElementById('recipeList');
      const counts = getCraftCounts();
      list.innerHTML = RECIPES.map(r => {
        const ok = recipeMatches(counts, r);
        return `<li class="${ok ? 'ok' : ''}">${r.label}</li>`;
      }).join('');
    }

    function toggleCraft() {
      craftOpen = !craftOpen;
      document.getElementById('craftPanel').classList.toggle('open', craftOpen);
      if (!craftOpen) {
        for (let i = 0; i < craftSlots.length; i++) returnCraftSlot(i);
        craftPick = null;
      }
      updateCraftUI();
    }

    function drawSky() {
      const g = ctx.createLinearGradient(0, 0, 0, canvas.height);
      g.addColorStop(0, '#4ea8de');
      g.addColorStop(0.6, '#87ceeb');
      g.addColorStop(1, '#b8e0f5');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      [[80, 60, 40, 14], [200, 90, 55, 18], [420, 50, 70, 20], [520, 110, 35, 12]].forEach(([x, y, w, h]) => {
        ctx.beginPath();
        ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function blockPreviewColor(block) {
      return block.top || block.base || block.mid || block.side || '#888';
    }

    function hash2(a, b) {
      return ((a * 374761 + b * 668265) & 0xffff) / 0xffff;
    }

    function drawBlock(tx, ty, block) {
      const x = tx * TILE;
      const y = ty * TILE;

      ctx.globalAlpha = 1;

      if (block.fluid) {
        const level = fluidLevel[ty][tx];
        const falling = fluidFalling[ty][tx];
        const openAbove = ty === 0 || world[ty - 1][tx] !== block.id;
        const depthFactor = falling || level === 0 ? 1 : Math.max(0.35, 1 - level / MAX_FLUID_LEVEL);
        const alpha = block.name === 'water'
          ? 0.72 + depthFactor * 0.18
          : 0.82 + depthFactor * 0.12;

        const body = ctx.createLinearGradient(x, y, x, y + TILE);
        body.addColorStop(0, block.light);
        body.addColorStop(0.45, block.base);
        body.addColorStop(1, block.deep);

        ctx.globalAlpha = alpha;
        ctx.fillStyle = body;
        ctx.fillRect(x, y, TILE, TILE + 2);

        if (openAbove) {
          const surfaceOffset = Math.floor(TILE * (1 - depthFactor));
          ctx.fillStyle = block.light;
          ctx.globalAlpha = 0.55;
          ctx.fillRect(x + 3, y + surfaceOffset + 1, TILE - 6, 4);
        }

        if (block.name === 'lava') {
          ctx.fillStyle = '#fef08a';
          ctx.globalAlpha = 0.35 + Math.sin(animFrame * 0.15 + tx + ty) * 0.1;
          ctx.fillRect(x + 6, y + 10, 6, 4);
          ctx.fillRect(x + 18, y + 18, 5, 3);
        }

        ctx.globalAlpha = 1;
        return;
      }

      if (block.name === 'grass') {
        ctx.fillStyle = block.side;
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = block.mid;
        ctx.fillRect(x, y + 5, TILE, 8);
        ctx.fillStyle = block.top;
        ctx.fillRect(x, y, TILE, 6);
        for (let i = 0; i < 6; i++) {
          const px = x + 2 + Math.floor(hash2(tx + i * 3, ty) * (TILE - 6));
          const py = y + 1 + Math.floor(hash2(tx, ty + i * 5) * 4);
          ctx.fillStyle = i % 2 ? block.dark : block.mid;
          ctx.fillRect(px, py, 2, 2);
        }
      } else if (block.name === 'leaves') {
        ctx.fillStyle = block.base;
        ctx.fillRect(x, y, TILE, TILE);
        for (let i = 0; i < 14; i++) {
          const px = x + Math.floor(hash2(tx + i * 5, ty + 2) * (TILE - 4));
          const py = y + Math.floor(hash2(tx * 3 + i, ty + i) * (TILE - 4));
          const tone = hash2(i, tx + ty);
          ctx.fillStyle = tone > 0.66 ? block.light : tone > 0.33 ? block.mid : block.dark;
          ctx.fillRect(px, py, 3, 3);
        }
        for (let i = 0; i < 5; i++) {
          const px = x + 2 + Math.floor(hash2(tx + i * 9, ty) * (TILE - 8));
          const py = y + 2 + Math.floor(hash2(tx, ty + i * 7) * (TILE - 8));
          ctx.fillStyle = block.hole;
          ctx.globalAlpha = 0.45;
          ctx.fillRect(px, py, 4, 4);
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = block.light;
        ctx.globalAlpha = 0.25;
        ctx.fillRect(x + 3, y + 2, TILE - 6, 4);
        ctx.globalAlpha = 1;
      } else if (block.name === 'dirt') {
        ctx.fillStyle = block.base;
        ctx.fillRect(x, y, TILE, TILE);
        for (let i = 0; i < 10; i++) {
          const px = x + Math.floor(hash2(tx + i, ty * 2) * (TILE - 3));
          const py = y + Math.floor(hash2(tx * 2, ty + i) * (TILE - 3));
          ctx.fillStyle = hash2(tx + i, ty) > 0.5 ? block.light : block.dark;
          ctx.fillRect(px, py, 3, 3);
        }
      } else if (block.name === 'stone' || block.name === 'cobblestone') {
        ctx.fillStyle = block.base;
        ctx.fillRect(x, y, TILE, TILE);
        const patches = block.name === 'cobblestone' ? 6 : 8;
        for (let i = 0; i < patches; i++) {
          const px = x + Math.floor(hash2(tx + i * 7, ty) * (TILE - 10));
          const py = y + Math.floor(hash2(tx, ty + i * 11) * (TILE - 10));
          const w = 6 + Math.floor(hash2(i, tx + ty) * 6);
          const h = 6 + Math.floor(hash2(tx, i + ty) * 6);
          ctx.fillStyle = hash2(i, tx) > 0.55 ? block.light : block.dark;
          ctx.fillRect(px, py, w, h);
        }
        ctx.fillStyle = block.mid;
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(x + 4 + i * 7, y + 2 + (i % 2) * 10, 4, 4);
        }
      } else if (block.name === 'wood') {
        ctx.fillStyle = block.base;
        ctx.fillRect(x, y, TILE, TILE);
        for (let i = 0; i < 5; i++) {
          const ringY = y + 3 + i * 6;
          ctx.fillStyle = block.ring;
          ctx.fillRect(x + 2, ringY, TILE - 4, 2);
        }
        ctx.fillStyle = block.dark;
        ctx.fillRect(x + 1, y, 2, TILE);
        ctx.fillRect(x + TILE - 3, y, 2, TILE);
      } else if (block.name === 'obsidian') {
        ctx.fillStyle = block.base;
        ctx.fillRect(x, y, TILE, TILE);
        const shine = ctx.createLinearGradient(x, y, x + TILE, y + TILE);
        shine.addColorStop(0, block.light);
        shine.addColorStop(0.35, block.mid);
        shine.addColorStop(1, block.dark);
        ctx.fillStyle = shine;
        ctx.globalAlpha = 0.55;
        ctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
        ctx.globalAlpha = 1;
      } else {
        ctx.fillStyle = blockPreviewColor(block);
        ctx.fillRect(x, y, TILE, TILE);
      }

      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      ctx.fillRect(x + TILE - 3, y, 3, TILE);
      ctx.fillRect(x, y + TILE - 3, TILE, 3);
      ctx.fillStyle = 'rgba(255,255,255,0.14)';
      ctx.fillRect(x, y, TILE, 2);
      ctx.fillRect(x, y, 2, TILE);
      ctx.globalAlpha = 1;
    }

    function drawWorld() {
      for (let y = 0; y < WORLD_H; y++) {
        for (let x = 0; x < WORLD_W; x++) {
          const block = getBlock(x, y);
          if (block.solid) drawBlock(x, y, block);
        }
      }
      for (let y = 0; y < WORLD_H; y++) {
        for (let x = 0; x < WORLD_W; x++) {
          const block = getBlock(x, y);
          if (block.fluid) drawBlock(x, y, block);
        }
      }
    }

    function drawPlayer() {
      const x = player.x;
      const y = player.y;

      ctx.fillStyle = '#3b2f2f';
      ctx.fillRect(x + 2, y + 18, 16, 10);

      ctx.fillStyle = '#4aa3df';
      ctx.fillRect(x + 3, y + 10, 14, 10);

      ctx.fillStyle = '#f4c89a';
      ctx.fillRect(x + 5, y + 2, 10, 10);

      ctx.fillStyle = '#2a1a0a';
      const eyeX = player.facing > 0 ? x + 10 : x + 6;
      ctx.fillRect(eyeX, y + 5, 2, 2);

      ctx.fillStyle = '#3b2f2f';
      ctx.fillRect(x + 1, y + 12, 4, 8);
      ctx.fillRect(x + 15, y + 12, 4, 8);
    }

    function drawHighlight() {
      const { tx, ty } = screenToTile(mouse.x, mouse.y);
      if (tx < 0 || ty < 0 || tx >= WORLD_W || ty >= WORLD_H) return;

      ctx.strokeStyle = mouse.down ? '#ff6666' : '#ffffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(tx * TILE + 1, ty * TILE + 1, TILE - 2, TILE - 2);
    }

    function updateHUD() {
      document.getElementById('coords').textContent =
        `x: ${Math.floor(player.x / TILE)}, y: ${Math.floor(player.y / TILE)}`;
      document.getElementById('blocks').textContent = `Блоков на острове: ${blockCount}`;
    }

    function updateHotbar() {
      const bar = document.getElementById('hotbar');
      bar.innerHTML = HOTBAR.map((name, i) => {
        const b = BLOCKS[name];
        const count = inventory[name] || 0;
        const active = selected === name ? ' active' : '';
        return `<div class="slot${active}" data-block="${name}" title="${name}: ${count}">
          <div class="swatch" style="background:${blockPreviewColor(b)}"></div>
          <span class="count">${count}</span>
        </div>`;
      }).join('');

      bar.querySelectorAll('.slot').forEach((el, i) => {
        el.onclick = () => { selected = HOTBAR[i]; craftPick = null; updateHotbar(); updateCraftUI(); };
      });
    }

    function loop() {
      animFrame++;
      tickFluids();
      tickMining();
      movePlayer();
      updateCamera();
      drawSky();
      ctx.save();
      ctx.translate(-Math.round(camera.x), -Math.round(camera.y));
      drawWorld();
      drawPlayer();
      drawMiningCracks();
      drawHighlight();
      ctx.restore();
      updateHUD();
      requestAnimationFrame(loop);
    }

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
      mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
    });

    canvas.addEventListener('mousedown', e => {
      e.preventDefault();
      SFX.wake();
      mouse.down = true;
      mouse.button = e.button;
      const { tx, ty } = screenToTile(mouse.x, mouse.y);
      if (e.button === 2) placeBlock(tx, ty);
    });

    canvas.addEventListener('mouseup', e => {
      mouse.down = false;
      mouse.button = -1;
      resetMining();
    });

    canvas.addEventListener('mouseleave', () => {
      mouse.down = false;
      mouse.button = -1;
      resetMining();
    });

    canvas.addEventListener('contextmenu', e => e.preventDefault());

    window.addEventListener('keydown', e => {
      SFX.wake();
      keys[e.key] = true;
      const map = { '1': 'grass', '2': 'dirt', '3': 'stone', '4': 'wood', '5': 'water', '6': 'lava' };
      if (map[e.key]) { selected = map[e.key]; craftPick = null; updateHotbar(); updateCraftUI(); }
      if (e.key === 'c' || e.key === 'C' || e.key === 'с' || e.key === 'С') {
        if (!e.repeat) toggleCraft();
      }
    });
    window.addEventListener('keyup', e => { keys[e.key] = false; });

    createIsland();
    updateHotbar();
    updateCraftUI();
    loop();
  </script>
</body>
</html>
