<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>No Such Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, sans-serif;
      padding: 48px 24px;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .tagline {
      opacity: 0.65;
      margin-bottom: 40px;
    }
    .games {
      display: grid;
      gap: 16px;
      list-style: none;
    }
    .game-card {
      display: block;
      padding: 20px 24px;
      background: #16162a;
      border: 2px solid #333;
      border-radius: 10px;
      color: inherit;
      text-decoration: none;
      transition: border-color 0.15s, transform 0.15s;
    }
    .game-card:hover {
      border-color: #8bc34a;
      transform: translateY(-2px);
    }
    .game-card h2 {
      font-size: 1.15rem;
      margin-bottom: 6px;
    }
    .game-card p {
      font-size: 0.9rem;
      opacity: 0.75;
      line-height: 1.5;
    }
    .badge {
      display: inline-block;
      margin-top: 12px;
      font-size: 0.75rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: #2a2a4a;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <main>
    <h1>No Such Games</h1>
    <p class="tagline">Browser prototypes and tiny games.</p>
    <ul class="games">
      <li>
        <a class="game-card" href="skyblock.html">
          <h2>2D Skyblock</h2>
          <p>Minecraft-style skyblock in the browser: mine blocks, craft, water and lava.</p>
          <span class="badge">prototype</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
